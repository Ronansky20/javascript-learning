<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javascript Learning Journey</title>
    <style>
        .stats {
            color: black;
        }
    </style>
</head>
<div id="characterSheet"></div>
<div id="characterHp"></div>
<btn type="button" id="characterSave">Save character</btn>
<div id="rollHistory"></div>
<div id="diceTrayDiv"></div>
<button type="button" id="rollAttackButton">Roll Attack</button>
<div id="attackRollHistory"></div>
<br />
<div>Items owned:</div>
<div id="itemDiv"></div>
<div id="weightDiv"></div>
<form id="addItemForm">
    <input id="addItemField" placeholder="Excalibur" />
    <input id="addItemWeightField" placeholder="10" />
    <button type="submit" id="addWeightAndItemButton">Add Item</button>
</form>
<form id="removeItemForm">
    <input id="removeItemField" placeholder="Excalibur"/>
    <button type="submit" id="removeWeightAndItemButton">Remove Item</button>
</form>
<br />
<div id="ownedGold"></div>
<input id="addGoldField" placeholder="100 gold">
<button type="button" id="addGoldButton">Add gold</button>

<script type="module" src="./main.js"></script>
</body>

</html>
